<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Learning</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #fdfbfb, #ebedee);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .word-card {
            transition: all 0.3s ease;
            border-radius: 20px;
            background: linear-gradient(to bottom right, #fef9d7, #f9f9f9);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        .word-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
        }
        .word-type-badge {
            font-size: 0.8rem;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            background: linear-gradient(to right, #fb923c, #facc15);
            color: white;
        }
        .level-badge {
            font-size: 0.8rem;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            background: linear-gradient(to right, #34d399, #3b82f6);
            color: white;
        }
        .note {
            font-size: 0.9rem;
            color: #475569;
            text-align: left;
        }
        .word {
            font-size: 1.4rem;
            font-weight: bold;
            color: #1e293b;
            text-align: center;
        }
        .translation {
            font-size: 1.1rem;
            color: #334155;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-10">
        <!-- Header -->
        <header class="text-center mb-10 animate__animated animate__fadeIn">
            <h1 class="text-4xl md:text-5xl font-extrabold text-indigo-700 mb-3">🌈 English Learning</h1>
            <p class="text-lg text-gray-600">Expand your vocabulary with colorful daily English words!</p>
        </header>

        <!-- Date Filter -->
        <div class="mb-10 text-center animate__animated animate__fadeIn">
            <label for="word-date" class="block text-lg font-medium text-gray-700 mb-2">📅 Select Date</label>
            <div class="flex justify-center items-center gap-4">
                <input type="date" id="word-date" class="px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-pink-400 focus:border-pink-400" />
                <button id="loadWordsBtn" class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-2 px-6 rounded-lg shadow-md">Load Words</button>
            </div>
        </div>

        <!-- Words Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="wordsGrid">
            <!-- Word cards will be dynamically added here -->
        </div>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="flex justify-center items-center mt-8 hidden">
            <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-pink-500"></div>
        </div>

        <!-- No Words Message -->
        <div id="noWordsMessage" class="text-center mt-8 hidden">
            <p class="text-gray-600">😕 No words found for the selected date. Try another day!</p>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="text-center mt-8 hidden">
            <p class="text-red-600">⚠️ An error occurred while loading words. Please try again.</p>
        </div>

        <!-- Generate New Words Button -->
        <div class="fixed bottom-8 right-8">
            <button id="generateWordsBtn" class="bg-yellow-400 hover:bg-yellow-500 text-white font-bold py-3 px-6 rounded-full shadow-lg transform hover:scale-105 transition-transform">
                ✨ Generate New Words
            </button>
        </div>
    </div>

    <script>
        // Define global variables
        const wordsGrid = document.getElementById('wordsGrid');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const noWordsMessage = document.getElementById('noWordsMessage');
        const errorMessage = document.getElementById('errorMessage');
        const generateWordsBtn = document.getElementById('generateWordsBtn');
        const loadWordsBtn = document.getElementById('loadWordsBtn');

        async function loadWords() {
            try {
                loadingSpinner.classList.remove('hidden');
                wordsGrid.innerHTML = '';
                noWordsMessage.classList.add('hidden');
                errorMessage.classList.add('hidden');

                const selectedDate = document.getElementById('word-date').value;
                console.log('Selected date:', selectedDate); // Debug log
                
                // Format the date to YYYY-MM-DD if it exists
                let url = '/api/words';
                if (selectedDate) {
                    // Ensure the date is in YYYY-MM-DD format
                    const [year, month, day] = selectedDate.split('-');
                    const formattedDate = `${year}-${month.padStart(2, '0')}-${day.padStart(2, '0')}`;
                    url = `/api/words?date=${formattedDate}`;
                }
                
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    credentials: 'same-origin'
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Response data:', data); // Debug log

                if (data.success) {
                    if (data.words.length === 0) {
                        noWordsMessage.classList.remove('hidden');
                    } else {
                        data.words.forEach((word, index) => {
                            const wordCard = document.createElement('div');
                            wordCard.className = 'word-card animate__animated animate__fadeInUp';
                            wordCard.style.animationDelay = `${index * 0.1}s`;
                            wordCard.innerHTML = `
                                <div class="p-6">
                                    <div class="flex justify-between items-center mb-4">
                                        <span class="word-type-badge">${word.type}</span>
                                        <span class="level-badge">${word.level}</span>
                                    </div>
                                    <h3 class="word mb-2">${word.word}</h3>
                                    <p class="translation mb-4">${word.translation}</p>
                                    ${word.note ? `<p class="note">${word.note}</p>` : ''}
                                </div>
                            `;
                            wordsGrid.appendChild(wordCard);
                        });
                    }
                } else {
                    errorMessage.classList.remove('hidden');
                    console.error('Error from server:', data.message);
                }
            } catch (error) {
                console.error('Error loading words:', error);
                errorMessage.classList.remove('hidden');
            } finally {
                loadingSpinner.classList.add('hidden');
            }
        }

        async function generateNewWords() {
            try {
                loadingSpinner.classList.remove('hidden');
                const response = await fetch('/api/generate-daily-words');
                const data = await response.json();

                if (data.success) {
                    await loadWords();
                } else {
                    alert(data.message || 'Failed to generate new words');
                }
            } catch (error) {
                console.error('Error generating words:', error);
                alert('An error occurred while generating new words');
            } finally {
                loadingSpinner.classList.add('hidden');
            }
        }

        // Add event listeners
        document.addEventListener('DOMContentLoaded', function() {
            loadWordsBtn.addEventListener('click', loadWords);
            generateWordsBtn.addEventListener('click', generateNewWords);
            // Load initial words
            loadWords();
        });
    </script>
</body>
</html>
