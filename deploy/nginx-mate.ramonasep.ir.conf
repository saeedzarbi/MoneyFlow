server {
    listen 80;
    listen [::]:80;
    server_name mate.ramonasep.ir;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mate.ramonasep.ir;

    # Wildcard certificate for *.ramonasep.ir
    ssl_certificate     /etc/letsencrypt/live/ramonasep.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ramonasep.ir/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 16M;

    access_log /var/log/nginx/mate.access.log;
    error_log  /var/log/nginx/mate.error.log;

    location /static/ {
        alias /root/MoneyFlow/Mate/static/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
