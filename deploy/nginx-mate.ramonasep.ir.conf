map $http_x_forwarded_proto $forwarded_proto {
    default $scheme;
    https   https;
    http    http;
}

server {
    listen 80;
    listen [::]:80;
    server_name mate.ramonasep.ir;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Behind Cloudflare Flexible, traffic arrives on :80 with
    # X-Forwarded-Proto: https — do not redirect again (loop).
    location / {
        if ($forwarded_proto != "https") {
            return 301 https://$host$request_uri;
        }

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name mate.ramonasep.ir;

    # Wildcard certificate for *.ramonasep.ir
    ssl_certificate     /etc/letsencrypt/live/ramonasep.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ramonasep.ir/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 16M;

    access_log /var/log/nginx/mate.access.log;
    error_log  /var/log/nginx/mate.error.log;

    location /static/ {
        alias /root/MoneyFlow/Mate/static/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
